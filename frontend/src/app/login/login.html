<div class="split-layout">
  <div class="brand-side">
    <div class="logo-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
        <path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path>
      </svg>
    </div>
    <h1>NSQTech Private Limited</h1>
    <h2 class="brand-subtitle">Software Engineer Internship Portal</h2>
  </div>

  <div class="form-side">
    <div class="login-card">
      <h2 class="signin-title">Sign In</h2>
      <p class="subtitle">Enter your credentials to access the system</p>

      <div class="outline-input">
        <label>User ID</label>
        <input #userId type="text" placeholder="Enter your ID">
      </div>

      <div class="outline-input">
        <label>Password</label>
        <div class="password-wrapper">
          <input #password [type]="showPassword ? 'text' : 'password'" placeholder="••••••••">
          <span class="eye-icon" (click)="togglePassword()">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </span>
        </div>
      </div>

      <div class="outline-input">
        <label>Role</label>
        <select #roleInput class="role-select">
          <option value="General User">General User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <button class="sign-in-btn" (click)="onLogin(userId.value, password.value, roleInput.value)">Sign In</button>
      
      <div class="error-box" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ errorMessage }}
      </div>
    </div>
  </div>
</div>
